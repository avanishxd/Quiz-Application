
services:
  db:
    image: mysql:5.7
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - quiz-network
    volumes:
      - dbdata:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      timeout: 20s
      retries: 10

  backend:
    build:
      context: ./QuizBackEnd
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - quiz-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    ports:
      - "${BACKEND_PORT:-8080}:8080"

  frontend:
    build:
      context: ./QuizFrontEnd
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    networks:
      - quiz-network
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"

networks:
  quiz-network:
    driver: bridge

volumes:
  dbdata:
